# cloudbuild.yaml — CivicPath Cloud Build + Cloud Run Deployment
# ================================================================
# Builds Docker image, pushes to Artifact Registry, deploys to Cloud Run.
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml
#
# Prerequisites:
#   - Enable Cloud Build, Cloud Run, Artifact Registry APIs
#   - Set env vars in Cloud Run service via console or gcloud CLI

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/civicpath:${SHORT_SHA}'
      - '.'

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/civicpath:${SHORT_SHA}'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'civicpath'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/civicpath:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--set-env-vars'
      - 'ENVIRONMENT=production'

substitutions:
  _REGION: us-central1
  _REPO: civicpath-repo

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/civicpath:${SHORT_SHA}'

options:
  logging: CLOUD_LOGGING_ONLY
